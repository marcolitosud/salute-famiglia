<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F5FAFD">
<title>Nuova password · Salute Famiglia</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:#FFFFFF; --bg:#F5FAFD; --line:#CDE4F1; --line-soft:#E8F1F7;
    --ink:#0F172A; --ink-2:#334155; --muted:#64748B;
    --primary:#0C4A6E; --primary-2:#075985; --accent:#0284C7; --accent-2:#0EA5E9;
    --soft:#E0F2FE; --soft-2:#BAE6FD;
    --rose:#B91C1C; --rose-bg:#FEE2E2;
    --ok:#047857; --ok-bg:#D1FAE5;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg); color: var(--ink); min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content:''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background-image: radial-gradient(rgba(12,74,110,0.03) 1px, transparent 1px);
    background-size: 3px 3px;
  }
  .wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px 20px; }
  .card {
    width: 100%; max-width: 420px; background: var(--paper);
    border: 1px solid var(--line); border-radius: 20px;
    padding: 32px 26px; box-shadow: 0 4px 24px -10px rgba(12,74,110,0.15);
  }
  .brand {
    width: 48px; height: 48px; flex-shrink: 0; margin-bottom: 22px;
    filter: drop-shadow(0 6px 14px rgba(12,74,110,0.3));
  }
  .brand svg { width: 100%; height: 100%; display: block; }
  h1 { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; color: var(--primary); line-height: 1.15; margin: 0 0 6px; letter-spacing: -0.02em; }
  .sub { font-size: 13.5px; color: var(--muted); margin: 0 0 24px; line-height: 1.55; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-2); margin: 14px 0 6px; }
  input[type=password] {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--line); border-radius: 10px;
    font-size: 15px; font-family: inherit; background: var(--paper); color: var(--ink);
  }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(2,132,199,0.12); }
  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
  button {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    background: var(--primary); color: white; font-size: 14.5px; font-weight: 600;
    font-family: inherit; cursor: pointer; margin-top: 20px; min-height: 44px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  button:hover { background: var(--primary-2); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .err { background: var(--rose-bg); color: var(--rose); padding: 10px 14px; border-radius: 8px; font-size: 12.5px; margin-top: 14px; font-weight: 500; display: none; }
  .err.show { display: block; }
  .ok { background: var(--ok-bg); color: var(--ok); padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-top: 14px; font-weight: 500; display: none; }
  .ok.show { display: block; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  a.back-link { display: inline-block; margin-top: 18px; font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 600; }
  a.back-link:hover { color: var(--primary); text-decoration: underline; }
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <div class="brand">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bm-g-reset" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0EA5E9"/>
            <stop offset="100%" stop-color="#0C4A6E"/>
          </linearGradient>
        </defs>
        <path d="M50 10 L14 42 L14 84 C14 88 17 91 21 91 L79 91 C83 91 86 88 86 84 L86 42 Z" fill="url(#bm-g-reset)"/>
        <path d="M50 54 C46 48, 36 48, 36 56 C36 64, 50 74, 50 74 C50 74, 64 64, 64 56 C64 48, 54 48, 50 54 Z" fill="white"/>
      </svg>
    </div>
    <h1>Imposta nuova password</h1>
    <p class="sub" id="sub-text">Scegli una nuova password per il tuo account.</p>

    <div id="form-area">
      <label for="pw1">Nuova password</label>
      <input type="password" id="pw1" autocomplete="new-password" minlength="8">
      <div class="hint">Almeno 8 caratteri</div>

      <label for="pw2">Conferma password</label>
      <input type="password" id="pw2" autocomplete="new-password" minlength="8">

      <button id="save-btn">Salva nuova password</button>
      <div class="err" id="err"></div>
    </div>

    <div class="ok" id="ok"></div>
    <a href="index.html" class="back-link">← Torna al login</a>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://qhdwmydcldfwlfddyqri.supabase.co';
const SUPABASE_KEY = 'sb_publishable_7gP7-jBlrN9yaxtgqOXVpQ_DRzNco8Y';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const errEl = document.getElementById('err');
const okEl = document.getElementById('ok');
const formArea = document.getElementById('form-area');
const subText = document.getElementById('sub-text');

// Quando l'utente clicca il link nell'email di Supabase, viene reindirizzato qui
// con un token nella URL. La libreria supabase-js legge l'hash e crea la sessione,
// emettendo l'evento PASSWORD_RECOVERY.
let recoveryReady = false;
supabase.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    recoveryReady = true;
    subText.textContent = 'Sei stato autenticato dal link nell\'email. Scegli una nuova password.';
  } else if (event === 'SIGNED_IN' && session) {
    // Se il token era valido, anche signed_in va bene
    recoveryReady = true;
  }
});

// Fallback: dopo 2 secondi controlla se abbiamo una sessione
setTimeout(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) recoveryReady = true;
  else if (!recoveryReady) {
    subText.innerHTML = 'Link non valido o scaduto. <a href="index.html">Torna al login</a> e richiedi un nuovo link.';
    formArea.style.display = 'none';
  }
}, 2000);

document.getElementById('save-btn').addEventListener('click', async () => {
  errEl.classList.remove('show');
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  if (pw1.length < 8) { showErr('La password deve avere almeno 8 caratteri.'); return; }
  if (pw1 !== pw2) { showErr('Le due password non coincidono.'); return; }

  if (!recoveryReady) {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { showErr('Sessione di recupero non valida. Torna al login e richiedi un nuovo link.'); return; }
  }

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const { error } = await supabase.auth.updateUser({ password: pw1 });
  btn.disabled = false;
  btn.textContent = 'Salva nuova password';

  if (error) { showErr('Errore: ' + error.message); return; }

  formArea.style.display = 'none';
  okEl.innerHTML = '✓ Password aggiornata. Stai per essere reindirizzato al login...';
  okEl.classList.add('show');
  await supabase.auth.signOut();
  setTimeout(() => { location.href = 'index.html'; }, 2000);
});

function showErr(msg) {
  errEl.textContent = msg;
  errEl.classList.add('show');
}
</script>
</body>
</html>
