<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F5FAFD">
<title>Referto · Salute Famiglia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:#FFFFFF; --bg:#F5FAFD; --surface-2:#E6F3FA;
    --line:#CDE4F1; --line-soft:#E8F1F7;
    --ink:#0F172A; --ink-2:#334155; --muted:#64748B;
    --primary:#0C4A6E; --primary-2:#075985; --accent:#0284C7; --accent-2:#0EA5E9;
    --soft:#E0F2FE; --soft-2:#BAE6FD;
    --amber:#B45309; --amber-bg:#FEF3C7;
    --rose:#B91C1C; --rose-bg:#FEE2E2;
    --ok:#047857; --ok-bg:#D1FAE5;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg); color: var(--ink); min-height: 100vh;
    -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
  }
  body::before {
    content:''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background-image: radial-gradient(rgba(12,74,110,0.03) 1px, transparent 1px);
    background-size: 3px 3px;
  }
  .serif-num { font-family: 'Fraunces', serif; font-feature-settings: 'ss01'; font-weight: 500; }

  .topbar {
    background: var(--paper); border-bottom: 1px solid var(--line);
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 10;
  }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 10px; background: var(--line-soft);
    border: none; display: flex; align-items: center; justify-content: center;
    color: var(--ink-2); cursor: pointer; text-decoration: none; flex-shrink: 0;
  }
  .icon-btn:hover { background: var(--soft); color: var(--primary); }
  .topbar-tag { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); flex: 1; text-align: center; }

  main { flex: 1; padding: 20px 20px 80px; max-width: 720px; width: 100%; margin: 0 auto; }

  /* HERO */
  .hero-kicker { font-size: 10.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .hero-kicker.alert { color: var(--rose); }
  .hero-kicker.warn { color: var(--amber); }
  .hero-title { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 600; color: var(--primary); line-height: 1.1; letter-spacing: -0.02em; margin: 0 0 10px; }
  .hero-meta { font-size: 12.5px; color: var(--muted); line-height: 1.5; }
  .hero-meta b { color: var(--ink-2); font-weight: 600; }

  .section { margin-top: 22px; }
  .section-h { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; color: var(--ink); margin: 0 0 12px; letter-spacing: -0.01em; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .section-h-sub { font-size: 10.5px; font-weight: 500; color: var(--muted); text-transform: none; letter-spacing: 0; display: inline-flex; align-items: center; gap: 4px; }

  /* ORIGINAL SCAN */
  .scan-card {
    background: var(--paper); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px; display: flex; align-items: center; gap: 14px;
    box-shadow: 0 1px 2px rgba(12,74,110,0.04);
  }
  .scan-thumb-wrap {
    width: 60px; flex-shrink: 0; display: flex; flex-direction: column; gap: 2px;
  }
  .scan-thumb {
    width: 60px; aspect-ratio: 3/4; background: var(--line-soft); border: 1px solid var(--line);
    border-radius: 8px; overflow: hidden; cursor: pointer;
  }
  .scan-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-info { flex: 1; min-width: 0; }
  .scan-label { font-size: 13px; font-weight: 600; color: var(--ink); }
  .scan-sub { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .scan-action {
    font-size: 12px; font-weight: 600; color: var(--primary); margin-top: 6px;
    display: inline-flex; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; padding: 0;
    font-family: inherit;
  }
  .scan-action:hover { color: var(--accent); }

  .pages-all {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 10px;
    display: none;
  }
  .pages-all.show { display: grid; }
  .pages-all .page-thumb {
    aspect-ratio: 3/4; border-radius: 8px; overflow: hidden; cursor: pointer;
    border: 1px solid var(--line); position: relative; background: var(--line-soft);
  }
  .pages-all .page-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .pages-all .page-thumb .badge { position: absolute; bottom: 4px; right: 4px; background: rgba(15,23,42,0.8); color: white; font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 4px; }
  .pages-all .page-thumb.pdf { display: flex; align-items: center; justify-content: center; flex-direction: column; color: var(--accent); font-size: 10px; font-weight: 600; gap: 4px; text-decoration: none; }

  /* PARAMETRI */
  .params-card {
    background: var(--paper); border: 1px solid var(--line); border-radius: 14px;
    overflow: hidden; box-shadow: 0 1px 2px rgba(12,74,110,0.04);
  }
  .param-row {
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--line-soft);
    transition: background 0.12s;
  }
  .param-row:last-child { border-bottom: none; }
  .param-row.has-trend { cursor: pointer; }
  .param-row.has-trend:hover { background: var(--line-soft); }
  .param-row.flag-warn { background: var(--amber-bg); }
  .param-row.flag-alert { background: var(--rose-bg); }
  .param-main { flex: 1; min-width: 0; }
  .param-name { font-size: 12.5px; font-weight: 600; color: var(--ink); line-height: 1.3; }
  .param-desc { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
  .param-row.flag-warn .param-desc { color: var(--amber); font-weight: 500; }
  .param-row.flag-alert .param-desc { color: var(--rose); font-weight: 500; }
  .param-right { text-align: right; flex-shrink: 0; display: flex; align-items: center; gap: 12px; }
  .param-val-box { text-align: right; }
  .param-val {
    font-family: 'Fraunces', serif; font-feature-settings: 'ss01';
    font-size: 22px; font-weight: 500; line-height: 1; color: var(--ok);
  }
  .param-val.flag-warn { color: var(--amber); }
  .param-val.flag-alert { color: var(--rose); }
  .param-val.flag-indeterminato { color: var(--ink-2); }
  .param-unit { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11.5px; font-weight: 500; opacity: 0.75; margin-left: 2px; }
  .param-pill-wrap { margin-top: 4px; }
  .pill { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 2.5px 7px; border-radius: 999px; letter-spacing: 0.02em; gap: 4px; }
  .pill-ok { background: var(--ok-bg); color: var(--ok); }
  .pill-warn { background: var(--amber-bg); color: var(--amber); }
  .pill-alert { background: var(--rose-bg); color: var(--rose); }
  .pill-muted { background: var(--line-soft); color: var(--ink-2); }
  .param-sparkline { width: 54px; height: 20px; flex-shrink: 0; }
  .param-chevron { color: var(--muted); flex-shrink: 0; }

  /* CONCLUSIONI */
  .conclusioni-box {
    background: var(--surface-2); border: 1px solid var(--line); border-radius: 14px;
    padding: 16px 18px; font-size: 13px; color: var(--ink-2); line-height: 1.6;
  }
  .conclusioni-box p { margin: 0; }

  /* AI INSIGHT */
  .insight-card {
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, var(--primary-2), var(--primary));
    color: white; border-radius: 16px; padding: 18px 20px;
  }
  .insight-card::after {
    content: ''; position: absolute; right: -20px; top: -20px; width: 100px; height: 100px;
    background: radial-gradient(circle, rgba(186,230,253,0.35), transparent 70%);
    border-radius: 50%;
  }
  .insight-kicker { font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .insight-text { font-size: 13px; line-height: 1.55; opacity: 0.95; }
  .insight-text b { color: white; }

  /* LIGHTBOX */
  .lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
    z-index: 200; align-items: center; justify-content: center; padding: 20px;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; }
  .lightbox-close {
    position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.1);
    color: white; border: none; width: 40px; height: 40px; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 24px; line-height: 1; font-family: inherit;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.2); }

  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 24px; background: var(--paper); border-radius: 12px; border: 1px dashed var(--line); }
  .loading-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 40px; color: var(--muted); font-size: 13px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--line); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <a href="#" class="icon-btn" id="back-btn" aria-label="Indietro">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
  </a>
  <div class="topbar-tag">Referto</div>
  <div style="width:34px;"></div>
</div>

<main>
  <div id="content">
    <div class="loading-wrap"><span class="spinner"></span> Caricamento referto...</div>
  </div>
</main>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close" aria-label="Chiudi">×</button>
  <img id="lightbox-img" alt="Pagina referto">
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://qhdwmydcldfwlfddyqri.supabase.co';
const SUPABASE_KEY = 'sb_publishable_7gP7-jBlrN9yaxtgqOXVpQ_DRzNco8Y';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const MESI_IT = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];

let currentReferto = null;

init();

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { location.href = 'index.html'; return; }

  const params = new URLSearchParams(location.search);
  const refertoId = params.get('id');
  if (!refertoId) {
    document.getElementById('content').innerHTML = '<div class="empty">ID referto mancante.</div>';
    return;
  }

  document.getElementById('back-btn').addEventListener('click', (e) => {
    e.preventDefault();
    if (currentReferto?.familiare_id) location.href = `familiare.html?id=${currentReferto.familiare_id}`;
    else history.back();
  });

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox').addEventListener('click', (e) => { if (e.target.id === 'lightbox') closeLightbox(); });

  const { data: referto, error: errRef } = await supabase
    .from('referti')
    .select(`*, categoria:categorie(id, slug, nome)`)
    .eq('id', refertoId).single();
  if (errRef || !referto) {
    document.getElementById('content').innerHTML = '<div class="empty">Referto non trovato o non accessibile.</div>';
    return;
  }
  currentReferto = referto;

  const { data: misurazioni } = await supabase
    .from('misurazioni').select('*').eq('referto_id', refertoId).order('ordine');

  // Per i trend: tutte le misurazioni dei referti dello stesso familiare
  const { data: tuttiRefertiFam } = await supabase
    .from('referti').select('id, data_esame').eq('familiare_id', referto.familiare_id);
  const refertoIdsFam = (tuttiRefertiFam || []).map(r => r.id);
  const dataByReferto = {};
  (tuttiRefertiFam || []).forEach(r => { dataByReferto[r.id] = r.data_esame; });

  let storico = [];
  if (refertoIdsFam.length > 0) {
    const { data: mis } = await supabase
      .from('misurazioni').select('referto_id, parametro_raw_name, valore_numerico, unita')
      .in('referto_id', refertoIdsFam).not('valore_numerico', 'is', null);
    storico = mis || [];
  }

  const filePaths = referto.file_paths && referto.file_paths.length > 0 ? referto.file_paths : (referto.file_path ? [referto.file_path] : []);
  const signedUrls = [];
  for (const p of filePaths) {
    const { data: sig } = await supabase.storage.from('referti').createSignedUrl(p, 3600);
    signedUrls.push({ path: p, url: sig?.signedUrl || null });
  }

  render(referto, misurazioni || [], storico, signedUrls, dataByReferto);
}

function render(r, misurazioni, storico, signedUrls, dataByReferto) {
  const d = new Date(r.data_esame);
  const dataLunga = `${d.getDate()} ${MESI_IT[d.getMonth()]} ${d.getFullYear()}`;

  // Stato globale del referto
  const nAlert = misurazioni.filter(m => m.flag === 'fuori_range_alto' || m.flag === 'fuori_range_basso').length;
  const nWarn = misurazioni.filter(m => m.flag === 'borderline').length;
  const kickerClass = nAlert > 0 ? 'alert' : nWarn > 0 ? 'warn' : '';
  const catNome = r.categoria?.nome || 'Referto';

  // Hero
  const heroHtml = `
    <div class="hero-kicker ${kickerClass}">${escapeHtml(catNome)} · ${dataLunga}</div>
    <h1 class="hero-title">${escapeHtml(r.sotto_tipo || 'Referto')}</h1>
    <div class="hero-meta">
      ${r.centro_medico ? `<div>${escapeHtml(r.centro_medico)}</div>` : ''}
      ${r.medico ? `<div style="margin-top:3px;">${escapeHtml(r.medico)}</div>` : ''}
    </div>
  `;

  // Scansione originale
  const scanHtml = signedUrls.length > 0 ? renderScanBlock(signedUrls) : '';

  // AI insight se ci sono alert
  const insightHtml = (nAlert > 0 || nWarn > 0) ? `
    <div class="section">
      <div class="insight-card">
        <div class="insight-kicker">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          ${nAlert > 0 ? 'Attenzione' : 'Valori da monitorare'}
        </div>
        <div class="insight-text">
          ${nAlert > 0
            ? `<b>${nAlert}</b> ${nAlert === 1 ? 'parametro è' : 'parametri sono'} <b>fuori range</b>${nWarn > 0 ? `, ${nWarn} borderline` : ''}. Valuta di condividere questo referto con il tuo medico.`
            : `<b>${nWarn}</b> ${nWarn === 1 ? 'parametro è' : 'parametri sono'} al limite. Utile monitorare l'andamento nei prossimi controlli.`
          }
        </div>
      </div>
    </div>
  ` : '';

  // Parametri
  const parametriHtml = misurazioni.length === 0
    ? '<div class="empty">Nessun parametro estratto.</div>'
    : `<div class="params-card">${misurazioni.map(m => renderParamRow(m, storico, dataByReferto)).join('')}</div>`;

  // Conclusioni
  const conclusioniHtml = r.conclusioni
    ? `<div class="conclusioni-box"><p>${escapeHtml(r.conclusioni)}</p></div>`
    : '<div class="empty">Nessuna conclusione presente.</div>';

  document.getElementById('content').innerHTML = `
    ${heroHtml}

    ${scanHtml ? `
      <div class="section">
        <div class="section-h">Documento originale</div>
        ${scanHtml}
      </div>
    ` : ''}

    ${insightHtml}

    <div class="section">
      <div class="section-h">
        Parametri estratti
        <span class="section-h-sub">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2l2.39 7.36H22l-6.2 4.51 2.37 7.36L12 16.72l-6.17 4.51 2.37-7.36L2 9.36h7.61z"/></svg>
          letti dall'AI
        </span>
      </div>
      ${parametriHtml}
    </div>

    <div class="section">
      <div class="section-h">Conclusioni del medico</div>
      ${conclusioniHtml}
    </div>
  `;

  // Attach handlers
  document.querySelectorAll('.scan-thumb[data-url]').forEach(el => el.addEventListener('click', () => openLightbox(el.dataset.url)));
  document.querySelectorAll('.page-thumb[data-url]').forEach(el => el.addEventListener('click', () => openLightbox(el.dataset.url)));
  const expandBtn = document.getElementById('expand-pages');
  if (expandBtn) expandBtn.addEventListener('click', () => {
    document.getElementById('pages-all').classList.toggle('show');
    expandBtn.textContent = document.getElementById('pages-all').classList.contains('show') ? 'Nascondi pagine' : `Mostra tutte le ${signedUrls.length} pagine`;
  });
  document.querySelectorAll('.param-row.has-trend').forEach(row => {
    row.addEventListener('click', () => {
      const paramName = row.dataset.paramName;
      location.href = `trend.html?familiare=${r.familiare_id}&param=${encodeURIComponent(paramName)}`;
    });
  });
}

function renderScanBlock(signedUrls) {
  const first = signedUrls[0];
  const nPag = signedUrls.length;
  const isFirstPdf = first.path.toLowerCase().endsWith('.pdf');
  const thumbHtml = isFirstPdf
    ? `<div class="scan-thumb" style="display:flex;align-items:center;justify-content:center;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent);"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></div>`
    : `<div class="scan-thumb" data-url="${first.url}"><img src="${first.url}" alt="Pagina 1" loading="lazy"></div>`;

  const allThumbsHtml = nPag > 1
    ? `<div class="pages-all" id="pages-all">${signedUrls.map((s, i) => {
        const isPdf = s.path.toLowerCase().endsWith('.pdf');
        return isPdf
          ? `<a href="${s.url}" target="_blank" rel="noopener" class="page-thumb pdf">
               <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
               Pag ${i+1}
             </a>`
          : `<div class="page-thumb" data-url="${s.url}"><img src="${s.url}" alt="Pagina ${i+1}" loading="lazy"><div class="badge">${i+1}</div></div>`;
      }).join('')}</div>`
    : '';

  return `
    <div class="scan-card">
      ${thumbHtml}
      <div class="scan-info">
        <div class="scan-label">Scansione originale</div>
        <div class="scan-sub">${nPag} pagin${nPag === 1 ? 'a' : 'e'} · tocca per ingrandire</div>
        ${nPag > 1 ? `<button class="scan-action" id="expand-pages">Mostra tutte le ${nPag} pagine</button>` : ''}
      </div>
    </div>
    ${allThumbsHtml}
  `;
}

function renderParamRow(m, storico, dataByReferto) {
  const numPart = m.valore_numerico !== null && m.valore_numerico !== undefined
    ? `<span>${escapeHtml(m.valore_numerico)}</span>${m.unita ? `<span class="param-unit">${escapeHtml(m.unita)}</span>` : ''}`
    : `<span>${escapeHtml(m.valore_testuale || '—')}</span>`;

  const flagClass = m.flag === 'ok' ? 'flag-ok'
                  : m.flag === 'borderline' ? 'flag-warn'
                  : (m.flag === 'fuori_range_alto' || m.flag === 'fuori_range_basso') ? 'flag-alert'
                  : 'flag-indeterminato';
  const flagLabel = m.flag === 'ok' ? 'normale'
                  : m.flag === 'borderline' ? 'borderline'
                  : m.flag === 'fuori_range_alto' ? 'alto'
                  : m.flag === 'fuori_range_basso' ? 'basso'
                  : null;

  let descStr = '';
  if (m.range_min !== null && m.range_max !== null) descStr = `VN ${m.range_min}–${m.range_max}`;
  else if (m.range_max !== null) descStr = `VN < ${m.range_max}`;
  else if (m.range_min !== null) descStr = `VN > ${m.range_min}`;
  if (m.unita && descStr) descStr += ` ${m.unita}`;

  // Sparkline se ho storico
  const keyMe = normalizeParamName(m.parametro_raw_name);
  const serieGrezza = storico.filter(s => normalizeParamName(s.parametro_raw_name) === keyMe);
  const serie = serieGrezza
    .map(s => ({ val: s.valore_numerico, data: dataByReferto[s.referto_id] }))
    .filter(s => s.val !== null && s.data)
    .sort((a, b) => new Date(a.data) - new Date(b.data));

  const hasTrend = serie.length >= 2;
  const trendHtml = hasTrend ? renderSparkline(serie) : '';
  const chevronHtml = hasTrend ? `<svg class="param-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>` : '';

  return `
    <div class="param-row ${hasTrend ? 'has-trend' : ''} ${m.flag === 'borderline' ? 'flag-warn' : ''} ${(m.flag === 'fuori_range_alto' || m.flag === 'fuori_range_basso') ? 'flag-alert' : ''}"
         ${hasTrend ? `data-param-name="${escapeHtml(m.parametro_raw_name)}"` : ''}>
      <div class="param-main">
        <div class="param-name">${escapeHtml(m.parametro_raw_name)}</div>
        ${descStr ? `<div class="param-desc">${descStr}</div>` : ''}
      </div>
      <div class="param-right">
        <div class="param-val-box">
          <div class="param-val ${flagClass}">${numPart}</div>
          ${flagLabel ? `<div class="param-pill-wrap"><span class="pill pill-${flagClass.replace('flag-','').replace('alert','alert').replace('warn','warn').replace('ok','ok').replace('indeterminato','muted')}">${flagLabel}</span></div>` : ''}
        </div>
        ${trendHtml}
        ${chevronHtml}
      </div>
    </div>
  `;
}

function renderSparkline(serie) {
  const W = 54, H = 20, PAD = 2;
  const vals = serie.map(s => s.val);
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const range = (max - min) || 1;
  const points = serie.map((s, i) => {
    const x = PAD + (i / (serie.length - 1)) * (W - 2 * PAD);
    const y = H - PAD - ((s.val - min) / range) * (H - 2 * PAD);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const [lastX, lastY] = points[points.length - 1].split(',').map(Number);
  const color = vals[vals.length - 1] > vals[0] ? '#DC2626' : vals[vals.length - 1] < vals[0] ? '#059669' : '#64748B';
  return `
    <svg class="param-sparkline" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <polyline points="${points.join(' ')}" fill="none" stroke="${color}" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
      <circle cx="${lastX}" cy="${lastY}" r="2" fill="${color}"/>
    </svg>
  `;
}

function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightbox-img').src = '';
}
function normalizeParamName(s) { return String(s || '').toLowerCase().trim().replace(/\s+/g, ' '); }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
