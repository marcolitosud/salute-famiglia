<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFFFFF">
<title>Profilo familiare · Salute</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F6F9FC;
    --surface: #FFFFFF;
    --line: #E2E8F0;
    --line-soft: #EEF2F7;
    --ink: #0F172A;
    --ink-2: #334155;
    --muted: #64748B;
    --primary: #0C4A6E;
    --primary-2: #075985;
    --accent: #0284C7;
    --soft: #E0F2FE;
    --soft-2: #BAE6FD;
    --ok: #047857;
    --ok-bg: #D1FAE5;
    --warn: #B45309;
    --warn-bg: #FEF3C7;
    --alert: #B91C1C;
    --alert-bg: #FEE2E2;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg); color: var(--ink); min-height: 100vh;
    -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
  }
  body { display: flex; flex-direction: column; }

  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--line);
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 4px;
    border: 1px solid var(--line); background: var(--surface); color: var(--ink-2);
    padding: 8px 12px; border-radius: 8px; text-decoration: none;
    font-size: 13px; font-weight: 500; transition: background 0.15s;
  }
  .back-btn:hover { background: var(--line-soft); }
  .topbar-title { font-size: 14px; font-weight: 600; color: var(--ink); flex: 1; text-align: center; padding-right: 80px; }

  main { flex: 1; padding: 20px 16px 40px; max-width: 680px; width: 100%; margin: 0 auto; }

  .profile-header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 22px;
    padding: 18px; background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; box-shadow: 0 1px 2px rgba(15,23,42,0.03);
  }
  .profile-avatar {
    width: 56px; height: 56px; border-radius: 14px; background: var(--soft);
    color: var(--primary); display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 20px; flex-shrink: 0; border: 1px solid var(--soft-2);
  }
  .profile-avatar.minore { background: var(--warn-bg); color: var(--warn); border-color: #FDE68A; }
  .profile-info { flex: 1; min-width: 0; }
  .profile-name { font-size: 20px; font-weight: 700; color: var(--ink); line-height: 1.2; letter-spacing: -0.02em; }
  .profile-meta { font-size: 13px; color: var(--muted); margin-top: 4px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .pill { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
  .pill-warn { background: var(--warn-bg); color: var(--warn); }

  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
  .section-title { font-size: 18px; font-weight: 700; color: var(--ink); margin: 0 0 14px; letter-spacing: -0.02em; }

  .categorie-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 28px;
  }
  .cat-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px; cursor: pointer; transition: transform 0.12s, border-color 0.15s, box-shadow 0.15s;
    display: flex; flex-direction: column; gap: 8px; min-height: 88px;
  }
  .cat-card:hover { border-color: var(--soft-2); box-shadow: 0 4px 12px -4px rgba(12,74,110,0.12); }
  .cat-card:active { transform: scale(0.98); }
  .cat-icon {
    width: 32px; height: 32px; border-radius: 8px; background: var(--soft);
    display: flex; align-items: center; justify-content: center; color: var(--primary);
  }
  .cat-name { font-size: 13px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; line-height: 1.2; }
  .cat-count { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .upload-btn-wrap { margin-bottom: 24px; }
  .upload-btn {
    width: 100%; padding: 14px; background: var(--primary); color: white;
    border: none; border-radius: 12px; font-size: 14px; font-weight: 600;
    font-family: inherit; cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 8px; transition: background 0.15s;
  }
  .upload-btn:hover { background: var(--primary-2); }
  .upload-btn:disabled { opacity: 0.7; cursor: not-allowed; }

  .referto-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px; display: flex; gap: 12px; margin-bottom: 8px;
    box-shadow: 0 1px 2px rgba(15,23,42,0.03);
  }
  .referto-date {
    flex-shrink: 0; text-align: center; width: 48px;
    padding: 6px 0; background: var(--soft); border: 1px solid var(--soft-2); border-radius: 8px;
  }
  .referto-date .dd { font-size: 16px; font-weight: 700; color: var(--primary); line-height: 1; }
  .referto-date .mm { font-size: 9.5px; font-weight: 600; color: var(--primary); text-transform: uppercase; margin-top: 2px; letter-spacing: 0.05em; }
  .referto-info { flex: 1; min-width: 0; }
  .referto-title { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.2; }
  .referto-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .referto-stato { font-size: 10.5px; font-weight: 600; padding: 2px 6px; border-radius: 5px; margin-top: 6px; display: inline-block; }

  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 28px 20px; background: var(--surface); border-radius: 12px; border: 1px dashed var(--line); }
  .loading-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 30px; color: var(--muted); font-size: 13px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--line); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MODAL UPLOAD */
  .modal-backdrop {
    display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.55);
    z-index: 100; align-items: flex-end; justify-content: center;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--surface); width: 100%; max-width: 540px;
    border-radius: 20px 20px 0 0; padding: 22px 20px 24px;
    max-height: 92vh; overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 36px; height: 4px; background: var(--line); border-radius: 2px; margin: 0 auto 14px; }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--ink); margin: 0 0 4px; letter-spacing: -0.01em; }
  .modal-sub { font-size: 13px; color: var(--muted); margin: 0 0 18px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-2); margin: 12px 0 6px; }
  select, input[type=date], input[type=text] {
    width: 100%; padding: 11px 12px; border: 1.5px solid var(--line); border-radius: 10px;
    font-size: 15px; font-family: inherit; background: var(--surface); color: var(--ink);
  }
  select:focus, input:focus { outline: none; border-color: var(--accent); }

  .file-picker {
    border: 2px dashed var(--soft-2); background: var(--soft); border-radius: 12px;
    padding: 22px 16px; text-align: center; cursor: pointer; transition: background 0.15s;
  }
  .file-picker:hover { background: #CFEAFA; }
  .file-picker.has-file { background: var(--ok-bg); border-color: var(--ok); border-style: solid; color: var(--ok); }
  .file-picker input[type=file] { display: none; }
  .file-picker .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn { flex: 1; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; border: none; }
  .btn-secondary { background: var(--surface); color: var(--ink-2); border: 1px solid var(--line); }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  .extraction-preview {
    background: var(--soft); border: 1px solid var(--soft-2); border-radius: 10px;
    padding: 12px 14px; margin-top: 14px; font-size: 12.5px; color: var(--primary);
    line-height: 1.6;
  }
  .extraction-preview b { font-weight: 700; }
  .extraction-preview .param-row {
    padding: 5px 0; border-bottom: 1px solid rgba(12,74,110,0.1); display: flex;
    justify-content: space-between; gap: 10px;
  }
  .extraction-preview .param-row:last-child { border-bottom: none; }
  .extraction-preview .param-name { font-weight: 500; color: var(--ink-2); }
  .extraction-preview .param-val { font-weight: 700; font-variant-numeric: tabular-nums; }
  .extraction-preview .flag-ok { color: var(--ok); }
  .extraction-preview .flag-warn { color: var(--warn); }
  .extraction-preview .flag-alert { color: var(--alert); }

  .err-msg { background: var(--alert-bg); color: var(--alert); padding: 10px 14px; border-radius: 8px; font-size: 12.5px; margin-top: 12px; font-weight: 500; }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    Indietro
  </a>
  <div class="topbar-title">Profilo</div>
</div>

<main>
  <div id="content">
    <div class="loading-wrap"><span class="spinner"></span> Caricamento profilo...</div>
  </div>
</main>

<!-- MODAL UPLOAD -->
<div class="modal-backdrop" id="upload-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 class="modal-title">Nuovo referto</h3>
    <p class="modal-sub">Carica un PDF o una foto. L'AI estrae i dati automaticamente.</p>

    <label>Categoria</label>
    <select id="m-categoria"></select>

    <label>Sotto-tipo (opzionale, es. "Emocromo")</label>
    <input type="text" id="m-sottotipo" placeholder="Lascia vuoto: l'AI lo compila">

    <label>Data esame</label>
    <input type="date" id="m-data">

    <label>File referto</label>
    <label class="file-picker" id="file-picker">
      <input type="file" id="m-file" accept="image/*,application/pdf">
      <div id="file-picker-label">
        <div style="font-weight:600;color:var(--ink-2);">Tocca per scegliere PDF o foto</div>
        <div class="hint">Da camera o libreria</div>
      </div>
    </label>

    <div id="extraction-area"></div>
    <div id="err-area"></div>

    <div class="modal-actions">
      <button class="btn btn-secondary" id="m-cancel">Annulla</button>
      <button class="btn btn-primary" id="m-submit">Estrai e salva</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://qhdwmydcldfwlfddyqri.supabase.co';
const SUPABASE_KEY = 'sb_publishable_7gP7-jBlrN9yaxtgqOXVpQ_DRzNco8Y';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// Icone per categoria
const ICONS = {
  'sangue-urine':   '<path d="M12 2s-5 6-5 11a5 5 0 0 0 10 0c0-5-5-11-5-11z" fill="currentColor"/>',
  'cardiologia':    '<path d="M20.84 4.6a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.07a5.5 5.5 0 0 0-7.78 7.78l1.06 1.07L12 21.23l7.78-7.78 1.06-1.07a5.5 5.5 0 0 0 0-7.78Z"/>',
  'imaging':        '<circle cx="12" cy="12" r="3"/><path d="M2 12a10 10 0 0 1 20 0"/><path d="M2 12a10 10 0 0 0 20 0"/>',
  'mappa-nei':      '<circle cx="12" cy="12" r="9"/><circle cx="9" cy="10" r="1" fill="currentColor"/><circle cx="15" cy="13" r="1" fill="currentColor"/>',
  'visite':         '<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"/>',
  'screening':      '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
  'odontoiatria':   '<path d="M12 5.5c-1.5-2-4-2.5-6-1.5-2 1-3 3.5-2 6 .5 1.5 1 3 .5 5 .5 2 2 5 3 5s1.5-2 2-4 1-3 2.5-3 2 1 2.5 3 1 4 2 4 2.5-3 3-5c-.5-2 0-3.5.5-5 1-2.5 0-5-2-6-2-1-4.5-.5-6 1.5Z"/>',
  'vaccinazioni':   '<path d="m18 2 4 4-10 10H8v-4L18 2Z"/><path d="m15 5 4 4"/>',
  'ricoveri':       '<path d="M8 2h8l4 4v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6Z"/><path d="M10 12h4M12 10v4"/>',
  'terapie':        '<path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/>',
};

const MESI_IT = ['GEN','FEB','MAR','APR','MAG','GIU','LUG','AGO','SET','OTT','NOV','DIC'];

// Stato globale
let currentFamiliare = null;
let currentCategorie = [];
let currentReferti = [];
let pickedFile = null;

// ---------- Init ----------
init();

async function init() {
  // Controllo sessione
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) {
    location.href = 'index.html';
    return;
  }

  // Leggi id dal query string
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id) {
    document.getElementById('content').innerHTML = '<div class="empty">ID familiare mancante.</div>';
    return;
  }

  // Fetch familiare
  const { data: fam, error: errFam } = await supabase
    .from('familiari')
    .select('*')
    .eq('id', id)
    .single();

  if (errFam || !fam) {
    document.getElementById('content').innerHTML = `<div class="empty">Profilo non trovato o non accessibile.</div>`;
    return;
  }
  currentFamiliare = fam;

  // Fetch categorie
  const { data: cats } = await supabase
    .from('categorie')
    .select('id, slug, nome, icona, ordine')
    .eq('is_sistema', true)
    .order('ordine');
  currentCategorie = cats || [];

  // Fetch referti
  await caricaReferti();

  renderProfile();
  setupModal();
}

async function caricaReferti() {
  const { data } = await supabase
    .from('referti')
    .select('id, sotto_tipo, data_esame, stato_estrazione, categoria_id, centro_medico')
    .eq('familiare_id', currentFamiliare.id)
    .order('data_esame', { ascending: false });
  currentReferti = data || [];
}

// ---------- Render ----------
function renderProfile() {
  const f = currentFamiliare;
  const initials = (f.nome[0] + (f.cognome[0] || '')).toUpperCase();
  const eta = etaDaData(f.data_nascita);
  const metaParts = [];
  if (eta !== null) metaParts.push(`${eta} anni`);
  if (f.ruolo_famiglia) metaParts.push(f.ruolo_famiglia);

  // Conteggio referti per categoria
  const countByCat = {};
  currentReferti.forEach(r => {
    countByCat[r.categoria_id] = (countByCat[r.categoria_id] || 0) + 1;
  });

  const catsHtml = currentCategorie.map(c => `
    <div class="cat-card" data-cat="${c.id}">
      <div class="cat-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          ${ICONS[c.slug] || '<circle cx="12" cy="12" r="9"/>'}
        </svg>
      </div>
      <div>
        <div class="cat-name">${c.nome}</div>
        <div class="cat-count">${countByCat[c.id] || 0} referti</div>
      </div>
    </div>
  `).join('');

  const refertiHtml = currentReferti.length === 0
    ? '<div class="empty">Nessun referto ancora caricato.<br>Usa il pulsante qui sopra per iniziare.</div>'
    : currentReferti.map(r => renderReferto(r)).join('');

  document.getElementById('content').innerHTML = `
    <div class="profile-header">
      <div class="profile-avatar ${f.is_minore ? 'minore' : ''}">${initials}</div>
      <div class="profile-info">
        <div class="profile-name">${f.nome} ${f.cognome}</div>
        <div class="profile-meta">
          ${f.is_minore ? '<span class="pill pill-warn">Minore</span>' : ''}
          <span>${metaParts.join(' · ') || '—'}</span>
        </div>
      </div>
    </div>

    <div class="upload-btn-wrap">
      <button class="upload-btn" id="btn-upload">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Nuovo referto
      </button>
    </div>

    <div class="section-label">Categorie</div>
    <h3 class="section-title" style="margin-top:0;">Archivio per tipologia</h3>
    <div class="categorie-grid">${catsHtml}</div>

    <div class="section-label">Cronologia</div>
    <h3 class="section-title" style="margin-top:0;">Ultimi referti</h3>
    ${refertiHtml}
  `;

  document.getElementById('btn-upload').addEventListener('click', openModal);
}

function renderReferto(r) {
  const d = new Date(r.data_esame);
  const dd = d.getDate().toString().padStart(2,'0');
  const mm = MESI_IT[d.getMonth()];
  const stato = statoReferto(r.stato_estrazione);
  return `
    <div class="referto-card">
      <div class="referto-date">
        <div class="dd">${dd}</div>
        <div class="mm">${mm}</div>
      </div>
      <div class="referto-info">
        <div class="referto-title">${r.sotto_tipo || 'Referto'}</div>
        <div class="referto-meta">${r.centro_medico || '—'}</div>
        <span class="referto-stato" style="background:${stato.bg};color:${stato.fg};">${stato.label}</span>
      </div>
    </div>
  `;
}

function statoReferto(s) {
  switch (s) {
    case 'done':       return { label: '✓ Estratto', bg: 'var(--ok-bg)',    fg: 'var(--ok)' };
    case 'processing': return { label: '… In corso', bg: 'var(--soft)',     fg: 'var(--primary)' };
    case 'error':      return { label: '! Errore',   bg: 'var(--alert-bg)', fg: 'var(--alert)' };
    case 'manual':     return { label: 'Manuale',    bg: 'var(--line-soft)',fg: 'var(--muted)' };
    default:           return { label: 'In attesa',  bg: 'var(--line-soft)',fg: 'var(--muted)' };
  }
}

function etaDaData(dataIso) {
  if (!dataIso) return null;
  const oggi = new Date();
  const nascita = new Date(dataIso);
  let eta = oggi.getFullYear() - nascita.getFullYear();
  const m = oggi.getMonth() - nascita.getMonth();
  if (m < 0 || (m === 0 && oggi.getDate() < nascita.getDate())) eta--;
  return eta;
}

// ---------- Upload Modal ----------
function setupModal() {
  const catSelect = document.getElementById('m-categoria');
  catSelect.innerHTML = currentCategorie.map(c => `<option value="${c.id}" data-slug="${c.slug}">${c.nome}</option>`).join('');

  const dataInput = document.getElementById('m-data');
  dataInput.value = new Date().toISOString().slice(0, 10);

  document.getElementById('m-cancel').addEventListener('click', closeModal);

  const fileInput = document.getElementById('m-file');
  fileInput.addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (!f) return;
    pickedFile = f;
    document.getElementById('file-picker').classList.add('has-file');
    document.getElementById('file-picker-label').innerHTML = `
      <div style="font-weight:600;">✓ ${f.name}</div>
      <div class="hint">${(f.size / 1024).toFixed(0)} KB · tocca per cambiare</div>
    `;
  });

  document.getElementById('m-submit').addEventListener('click', handleSubmit);
}

function openModal() {
  document.getElementById('upload-modal').classList.add('show');
  resetModal();
}

function closeModal() {
  document.getElementById('upload-modal').classList.remove('show');
}

function resetModal() {
  pickedFile = null;
  document.getElementById('m-file').value = '';
  document.getElementById('m-sottotipo').value = '';
  document.getElementById('extraction-area').innerHTML = '';
  document.getElementById('err-area').innerHTML = '';
  document.getElementById('file-picker').classList.remove('has-file');
  document.getElementById('file-picker-label').innerHTML = `
    <div style="font-weight:600;color:var(--ink-2);">Tocca per scegliere PDF o foto</div>
    <div class="hint">Da camera o libreria</div>
  `;
  document.getElementById('m-data').value = new Date().toISOString().slice(0, 10);
}

async function handleSubmit() {
  const errArea = document.getElementById('err-area');
  errArea.innerHTML = '';

  if (!pickedFile) {
    errArea.innerHTML = '<div class="err-msg">Seleziona un file prima di procedere.</div>';
    return;
  }

  const submitBtn = document.getElementById('m-submit');
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner" style="border-top-color:white;"></span> Estrazione in corso...';

  try {
    // 1. Leggi file come base64
    const base64 = await fileToBase64(pickedFile);

    // 2. Chiama Edge Function
    const extractArea = document.getElementById('extraction-area');
    extractArea.innerHTML = '<div class="extraction-preview"><b>L\'AI sta leggendo il referto...</b></div>';

    const { data: { session } } = await supabase.auth.getSession();
    const functionUrl = `${SUPABASE_URL}/functions/v1/estrai-referto`;
    const res = await fetch(functionUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`,
      },
      body: JSON.stringify({
        file_base64: base64,
        mime_type: pickedFile.type,
      }),
    });

    const result = await res.json();
    if (!result.ok) {
      throw new Error(result.error || result.details || 'Estrazione fallita');
    }

    // 3. Mostra preview
    renderExtractionPreview(result.data, result.usage);

    // 4. Salva su DB
    await salvaReferto(result.data, base64);

    submitBtn.innerHTML = '✓ Salvato';
    setTimeout(() => {
      closeModal();
      caricaReferti().then(renderProfile);
    }, 1200);
  } catch (err) {
    console.error(err);
    errArea.innerHTML = `<div class="err-msg">Errore: ${err.message}</div>`;
    submitBtn.disabled = false;
    submitBtn.textContent = 'Estrai e salva';
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(',')[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function renderExtractionPreview(data, usage) {
  const paramsHtml = (data.parametri || []).map(p => {
    const val = p.valore_numerico !== null && p.valore_numerico !== undefined
      ? `${p.valore_numerico}${p.unita ? ' ' + p.unita : ''}`
      : (p.valore_testuale || '—');
    const flagClass = p.flag === 'ok' ? 'flag-ok'
                    : p.flag === 'borderline' ? 'flag-warn'
                    : (p.flag === 'fuori_range_alto' || p.flag === 'fuori_range_basso') ? 'flag-alert'
                    : '';
    return `<div class="param-row"><span class="param-name">${p.nome}</span><span class="param-val ${flagClass}">${val}</span></div>`;
  }).join('');

  document.getElementById('extraction-area').innerHTML = `
    <div class="extraction-preview">
      <div style="margin-bottom:8px;"><b>${data.sotto_tipo || 'Referto'}</b> · ${data.data_esame || ''}</div>
      <div style="font-size:11.5px;color:var(--muted);margin-bottom:8px;">${data.centro_medico || ''}${data.medico ? ' · ' + data.medico : ''}</div>
      ${paramsHtml || '<div style="color:var(--muted);font-style:italic;">Nessun parametro numerico.</div>'}
      ${data.conclusioni ? `<div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(12,74,110,0.15);"><b>Conclusioni:</b> ${data.conclusioni}</div>` : ''}
      ${usage ? `<div style="margin-top:8px;font-size:10.5px;color:var(--muted);">Token usati: ${usage.input_tokens} in + ${usage.output_tokens} out</div>` : ''}
    </div>
  `;
}

async function salvaReferto(aiData, base64) {
  // Risolvi categoria
  const slug = aiData.categoria_suggerita || document.getElementById('m-categoria').selectedOptions[0].dataset.slug;
  const cat = currentCategorie.find(c => c.slug === slug) || currentCategorie.find(c => c.id === document.getElementById('m-categoria').value);

  // Upload file nel bucket "referti"
  const ext = pickedFile.name.split('.').pop();
  const fileName = `${currentFamiliare.id}/${Date.now()}-${crypto.randomUUID()}.${ext}`;
  const blob = await (await fetch(`data:${pickedFile.type};base64,${base64}`)).blob();

  const { error: upErr } = await supabase.storage
    .from('referti')
    .upload(fileName, blob, { contentType: pickedFile.type });
  if (upErr) throw new Error('Upload file fallito: ' + upErr.message);

  // Insert referto
  const sottotipoManuale = document.getElementById('m-sottotipo').value.trim();
  const dataManuale = document.getElementById('m-data').value;
  const { data: refertoRow, error: errIns } = await supabase
    .from('referti')
    .insert({
      familiare_id: currentFamiliare.id,
      categoria_id: cat.id,
      sotto_tipo: sottotipoManuale || aiData.sotto_tipo,
      data_esame: aiData.data_esame || dataManuale,
      centro_medico: aiData.centro_medico,
      medico: aiData.medico,
      file_path: fileName,
      file_mime: pickedFile.type,
      file_size: pickedFile.size,
      ai_metadata: aiData,
      conclusioni: aiData.conclusioni,
      stato_estrazione: 'done',
    })
    .select()
    .single();
  if (errIns) throw new Error('Salvataggio referto fallito: ' + errIns.message);

  // Insert misurazioni
  const misurazioni = (aiData.parametri || []).map((p, i) => ({
    referto_id: refertoRow.id,
    parametro_raw_name: p.nome,
    valore_numerico: p.valore_numerico,
    valore_testuale: p.valore_testuale,
    unita: p.unita,
    range_min: p.range_min,
    range_max: p.range_max,
    flag: p.flag || 'indeterminato',
    ordine: i,
  }));
  if (misurazioni.length > 0) {
    const { error: errMis } = await supabase.from('misurazioni').insert(misurazioni);
    if (errMis) console.warn('Errore salvataggio misurazioni:', errMis.message);
  }
}
</script>
