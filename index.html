<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFFFFF">
<title>Salute · Famiglia Farina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Bianchi e neutri */
    --bg: #F6F9FC;           /* azzurro polvere */
    --surface: #FFFFFF;
    --line: #E2E8F0;
    --line-soft: #EEF2F7;

    /* Testo */
    --ink: #0F172A;          /* nero caldo slate-900 */
    --ink-2: #334155;        /* slate-700 */
    --muted: #64748B;        /* slate-500 */

    /* Blu / celeste */
    --primary: #0C4A6E;      /* blu petrolio profondo (sky-900) */
    --primary-2: #075985;    /* sky-800 */
    --accent: #0284C7;       /* sky-600 */
    --soft: #E0F2FE;         /* celeste tenue (sky-100) */
    --soft-2: #BAE6FD;       /* sky-200 */

    /* Stati */
    --ok: #047857;
    --ok-bg: #D1FAE5;
    --warn: #B45309;
    --warn-bg: #FEF3C7;
    --alert: #B91C1C;
    --alert-bg: #FEE2E2;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    font-feature-settings: 'cv11', 'ss01';
  }
  body {
    display: flex;
    flex-direction: column;
  }

  /* ============ LOGIN ============ */
  #login-view {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    min-height: 100vh;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(2,132,199,0.08), transparent 70%),
      linear-gradient(180deg, #F6F9FC 0%, #EEF5FB 100%);
  }
  .login-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 36px 28px 28px;
    width: 100%;
    max-width: 420px;
    box-shadow:
      0 1px 2px rgba(15,23,42,0.04),
      0 20px 40px -12px rgba(12,74,110,0.15);
    border: 1px solid var(--line);
  }
  .brand-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .brand-mark {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex; align-items: center; justify-content: center;
    color: white;
  }
  .brand-name {
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .brand-tag {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    margin-top: -2px;
  }
  .login-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
    margin: 0 0 4px;
    letter-spacing: -0.02em;
  }
  .login-sub {
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 24px;
    line-height: 1.5;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-2);
    margin: 14px 0 6px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
    background: var(--surface);
    color: var(--ink);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(2,132,199,0.15);
  }
  button.primary {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: -0.005em;
  }
  button.primary:hover { background: var(--primary-2); }
  button.primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .error-box {
    background: var(--alert-bg);
    color: var(--alert);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-top: 14px;
    display: none;
    font-weight: 500;
  }
  .error-box.show { display: block; }

  /* ============ APP ============ */
  #app-view { display: none; flex-direction: column; min-height: 100vh; }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .user-chip {
    display: flex; align-items: center; gap: 10px; min-width: 0;
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--soft);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
    flex-shrink: 0;
    border: 1px solid var(--soft-2);
  }
  .user-chip-text { min-width: 0; }
  .user-chip-text .hello {
    font-size: 11px; color: var(--muted); line-height: 1;
    font-weight: 500;
  }
  .user-chip-text .name {
    font-size: 13.5px; font-weight: 600; color: var(--ink);
    margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .logout-btn {
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink-2);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .logout-btn:hover { background: var(--line-soft); }
  main { flex: 1; padding: 28px 20px 40px; max-width: 680px; width: 100%; margin: 0 auto; }
  .hero-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .hero-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.15;
    margin: 6px 0 6px;
    letter-spacing: -0.02em;
  }
  .hero-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .familiare-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
    box-shadow: 0 1px 2px rgba(15,23,42,0.03);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.15s, border-color 0.15s;
  }
  .familiare-card:hover {
    border-color: var(--soft-2);
    box-shadow: 0 4px 12px -4px rgba(12,74,110,0.12);
  }
  .familiare-card:active { transform: scale(0.99); }
  .familiare-card.minore::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--warn);
  }
  .familiare-avatar {
    width: 48px; height: 48px; border-radius: 12px;
    background: var(--soft);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px;
    flex-shrink: 0;
    border: 1px solid var(--soft-2);
  }
  .familiare-avatar.minore {
    background: var(--warn-bg);
    color: var(--warn);
    border-color: #FDE68A;
  }
  .familiare-info { flex: 1; min-width: 0; }
  .familiare-name {
    font-size: 15px; font-weight: 600; color: var(--ink);
    line-height: 1.2;
    letter-spacing: -0.01em;
  }
  .familiare-meta {
    font-size: 12.5px; color: var(--muted);
    margin-top: 4px;
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .pill {
    display: inline-flex; align-items: center;
    font-size: 11px; font-weight: 600;
    padding: 3px 8px; border-radius: 6px;
    letter-spacing: -0.005em;
  }
  .pill-warn { background: var(--warn-bg); color: var(--warn); }
  .pill-sky { background: var(--soft); color: var(--primary); border: 1px solid var(--soft-2); }
  .chev { color: var(--muted); flex-shrink: 0; }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 40px 20px;
    background: var(--surface);
    border-radius: 14px;
    border: 1px dashed var(--line);
  }
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--line);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 40px; color: var(--muted); font-size: 13px;
  }

  .debug-box {
    margin-top: 28px;
    padding: 12px 14px;
    background: var(--soft);
    border: 1px solid var(--soft-2);
    border-radius: 10px;
    font-family: ui-monospace, 'SF Mono', monospace;
    font-size: 11.5px;
    color: var(--primary);
    line-height: 1.6;
    word-break: break-all;
  }
  .debug-box b { color: var(--primary); }
  .debug-box code {
    background: white;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10.5px;
  }
</style>
</head>
<body>

<!-- =============== LOGIN VIEW =============== -->
<div id="login-view">
  <div class="login-card">
    <div class="brand-row">
      <div class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L14.5 7.5L20 8.5L16 12.5L17 18L12 15.5L7 18L8 12.5L4 8.5L9.5 7.5L12 2Z"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Salute Famiglia</div>
        <div class="brand-tag">Diario sanitario personale</div>
      </div>
    </div>

    <h1 class="login-title">Accedi al tuo diario</h1>
    <p class="login-sub">Entra con la tua email per vedere le tue cartelle e caricare nuovi referti.</p>

    <form id="login-form" autocomplete="on">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" required placeholder="nome@esempio.it">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>

      <button type="submit" class="primary" id="login-btn">Entra</button>
      <div class="error-box" id="error-box"></div>
    </form>
  </div>
</div>

<!-- =============== APP VIEW =============== -->
<div id="app-view">
  <div class="topbar">
    <div class="user-chip">
      <div class="avatar" id="user-avatar">?</div>
      <div class="user-chip-text">
        <div class="hello">Ciao,</div>
        <div class="name" id="user-email">—</div>
      </div>
    </div>
    <button class="logout-btn" id="logout-btn">Esci</button>
  </div>

  <main>
    <div class="hero-label">Archivio familiare</div>
    <h2 class="hero-title">Le tue cartelle</h2>
    <p class="hero-sub">Le persone a cui hai accesso. Tocca per aprire il profilo.</p>

    <div id="familiari-list">
      <div class="loading-wrap">
        <span class="spinner"></span> Caricamento...
      </div>
    </div>

    <div class="debug-box" id="debug-box" style="display:none;">
      <b>Debug RLS</b><br>
      <span id="debug-content"></span>
    </div>
  </main>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://qhdwmydcldfwlfddyqri.supabase.co';
const SUPABASE_KEY = 'sb_publishable_7gP7-jBlrN9yaxtgqOXVpQ_DRzNco8Y';

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const loginView = document.getElementById('login-view');
const appView = document.getElementById('app-view');
const loginForm = document.getElementById('login-form');
const loginBtn = document.getElementById('login-btn');
const errorBox = document.getElementById('error-box');

async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) await showApp(session);
  else showLogin();
}

supabase.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_OUT') showLogin();
});

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.classList.remove('show');
  loginBtn.disabled = true;
  loginBtn.innerHTML = '<span class="spinner" style="border-top-color:white;"></span>';

  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  loginBtn.disabled = false;
  loginBtn.textContent = 'Entra';

  if (error) {
    errorBox.textContent = traduciErrore(error.message);
    errorBox.classList.add('show');
    return;
  }
  await showApp(data.session);
});

function traduciErrore(msg) {
  if (!msg) return 'Errore sconosciuto.';
  if (msg.includes('Invalid login credentials')) return 'Email o password errate.';
  if (msg.includes('Email not confirmed')) return 'Email non confermata. Controlla la casella.';
  return msg;
}

document.getElementById('logout-btn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  document.getElementById('password').value = '';
});

function showLogin() {
  loginView.style.display = 'flex';
  appView.style.display = 'none';
}

async function showApp(session) {
  loginView.style.display = 'none';
  appView.style.display = 'flex';

  const email = session.user.email;
  document.getElementById('user-email').textContent = email;
  document.getElementById('user-avatar').textContent = email.charAt(0).toUpperCase();

  await caricaFamiliari(session.user.id);
}

async function caricaFamiliari(userId) {
  const listEl = document.getElementById('familiari-list');
  const debugBox = document.getElementById('debug-box');
  const debugContent = document.getElementById('debug-content');

  const { data, error } = await supabase
    .from('familiari')
    .select('id, nome, cognome, data_nascita, sesso, ruolo_famiglia, is_minore')
    .order('is_minore', { ascending: true })
    .order('created_at', { ascending: true });

  debugBox.style.display = 'block';
  debugContent.innerHTML = `
    user_id: <code>${userId}</code><br>
    familiari visibili (via RLS): <b>${data ? data.length : 0}</b>
    ${error ? `<br>errore: ${error.message}` : ''}
  `;

  if (error) {
    listEl.innerHTML = `<div class="empty">Errore nel caricamento: ${error.message}</div>`;
    return;
  }
  if (!data || data.length === 0) {
    listEl.innerHTML = `<div class="empty">Nessun familiare visibile per questo utente.</div>`;
    return;
  }

  listEl.innerHTML = data.map(f => {
    const initials = (f.nome[0] + (f.cognome[0] || '')).toUpperCase();
    const eta = etaDaData(f.data_nascita);
    const metaParts = [];
    if (eta !== null) metaParts.push(`${eta} anni`);
    if (f.ruolo_famiglia) metaParts.push(f.ruolo_famiglia);
    return `
      <div class="familiare-card ${f.is_minore ? 'minore' : ''}">
        <div class="familiare-avatar ${f.is_minore ? 'minore' : ''}">${initials}</div>
        <div class="familiare-info">
          <div class="familiare-name">${f.nome} ${f.cognome}</div>
          <div class="familiare-meta">
            ${f.is_minore ? '<span class="pill pill-warn">Minore</span>' : ''}
            <span>${metaParts.join(' · ') || '—'}</span>
          </div>
        </div>
        <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </div>
    `;
  }).join('');
}

function etaDaData(dataIso) {
  if (!dataIso) return null;
  const oggi = new Date();
  const nascita = new Date(dataIso);
  let eta = oggi.getFullYear() - nascita.getFullYear();
  const m = oggi.getMonth() - nascita.getMonth();
  if (m < 0 || (m === 0 && oggi.getDate() < nascita.getDate())) eta--;
  return eta;
}

checkSession();
</script>

</body>
</html>
